<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <linearGradient id="pawGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#075985" stroke-width="8"/>

  <!-- Paw print - main pad -->
  <ellipse cx="256" cy="300" rx="70" ry="60" fill="url(#pawGradient)"/>

  <!-- Paw print - top left toe -->
  <ellipse cx="170" cy="200" rx="35" ry="45" fill="url(#pawGradient)" transform="rotate(-20 170 200)"/>

  <!-- Paw print - top inner left toe -->
  <ellipse cx="220" cy="170" rx="30" ry="40" fill="url(#pawGradient)" transform="rotate(-5 220 170)"/>

  <!-- Paw print - top inner right toe -->
  <ellipse cx="292" cy="170" rx="30" ry="40" fill="url(#pawGradient)" transform="rotate(5 292 170)"/>

  <!-- Paw print - top right toe -->
  <ellipse cx="342" cy="200" rx="35" ry="45" fill="url(#pawGradient)" transform="rotate(20 342 200)"/>

  <!-- Medical cross on main pad -->
  <rect x="244" y="270" width="24" height="60" rx="4" fill="#0ea5e9"/>
  <rect x="232" y="288" width="48" height="24" rx="4" fill="#0ea5e9"/>
</svg>
